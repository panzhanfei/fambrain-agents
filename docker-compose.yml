# FamBrain Docker 编排（web + agents + chroma）
# Ollama 不在此编排内，请在 .env 配置外部地址（如局域网台式机）
# 用法：pnpm docker:up
# 端口从仓库根 .env 读取：PORT / AGENTS_PORT / CHROMA_PORT

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: file:/app/packages/db/prisma/dev.db
      AGENTS_SERVICE_URL: http://agents:${AGENTS_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET:-fambrain-docker-dev-secret-change-me!!}
    volumes:
      - fambrain-db:/app/packages/db/prisma
    depends_on:
      - agents
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: Dockerfile.agents
    env_file: .env
    ports:
      - "${AGENTS_PORT:-3001}:${AGENTS_PORT:-3001}"
    environment:
      AGENTS_PORT: ${AGENTS_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET:-fambrain-docker-dev-secret-change-me!!}
      CHROMA_SERVER_URL: http://chroma:8000
    volumes:
      - fambrain-doc:/app/data/doc
      - fambrain-chroma:/app/data/chroma
    depends_on:
      - chroma
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    env_file: .env
    ports:
      - "${CHROMA_PORT:-8030}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - fambrain-chroma:/chroma/chroma
    restart: unless-stopped

volumes:
  fambrain-db:
  fambrain-doc:
  fambrain-chroma:
