# FamBrain 一键编排（本地 / 服务器）
# 用法：pnpm docker:up
# 端口从仓库根 .env 读取：PORT / AGENTS_PORT / OLLAMA_PORT / CHROMA_PORT

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: file:/app/packages/db/prisma/dev.db
      AGENTS_SERVICE_URL: http://agents:${AGENTS_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET:-fambrain-docker-dev-secret-change-me!!}
    volumes:
      - fambrain-db:/app/packages/db/prisma
    depends_on:
      - agents
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: Dockerfile.agents
    env_file: .env
    ports:
      - "${AGENTS_PORT:-3001}:${AGENTS_PORT:-3001}"
    environment:
      AGENTS_PORT: ${AGENTS_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET:-fambrain-docker-dev-secret-change-me!!}
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_SERVER_URL: http://chroma:8000
    volumes:
      - fambrain-doc:/app/data/doc
      - fambrain-chroma:/app/data/chroma
    depends_on:
      - ollama
      - chroma
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    env_file: .env
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    env_file: .env
    ports:
      - "${CHROMA_PORT:-8030}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - fambrain-chroma:/chroma/chroma
    restart: unless-stopped

volumes:
  fambrain-db:
  fambrain-doc:
  fambrain-chroma:
  ollama-data:
